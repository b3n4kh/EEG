services:
  eeg-sumsum:
    image: ghcr.io/b3n4kh/eeg:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      APP_ENV: production
      ADDR: ":8080"
      DATABASE_PATH: /data/eeg.db
      TZ: Europe/Vienna
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EDA_BASE_URL: ${EDA_BASE_URL:-https://prod-api.eda-portal.at/api}
      EDA_SERIES_BASE_URL: ${EDA_SERIES_BASE_URL:-https://prod.eda-portal.at/api}
      EDA_USERNAME: ${EDA_USERNAME:-}
      EDA_PASSWORD: ${EDA_PASSWORD:-}
      EDA_COMMUNITY_ID: ${EDA_COMMUNITY_ID:-}
      EDA_METERING_POINTS: ${EDA_METERING_POINTS:-}
    volumes:
      - eeg_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  eeg_data:
